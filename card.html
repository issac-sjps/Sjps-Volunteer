<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>志工識別證</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: "Microsoft JhengHei", sans-serif;
    background: #eef1f3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    padding: 16px;
  }
  .card {
    width: 100%;
    max-width: 340px;
    border-radius: 20px;
    padding: 28px 20px;
    color: #fff;
    box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    text-align: center;
  }
  .card.expired { background: #7f8c8d !important; }
  .icon { font-size: clamp(48px, 15vw, 64px); line-height: 1; margin-bottom: 6px; }
  .name { font-size: clamp(24px, 7vw, 28px); font-weight: bold; margin: 6px 0; }
  .group { font-size: clamp(16px, 5vw, 19px); margin-bottom: 14px; }
  .period { margin-bottom: 16px; }
  .period .until { font-size: clamp(13px, 4vw, 15px); opacity: 0.9; }
  .period .until-date {
    font-size: clamp(22px, 6.5vw, 26px); font-weight: bold;
    color: #ffd700; text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    margin: 2px 0;
  }
  .period .since { font-size: clamp(11px, 3.5vw, 13px); opacity: 0.8; margin-top: 2px; }
  .status {
    display: inline-block; padding: 5px 16px; border-radius: 20px;
    background: rgba(255,255,255,0.25); font-size: clamp(13px, 4vw, 15px); margin-bottom: 18px;
  }
  .clock {
    font-size: clamp(20px, 6vw, 24px); font-weight: bold; letter-spacing: 1px;
    background: rgba(0,0,0,0.15); border-radius: 10px; padding: 10px;
  }
  .clock .blink { opacity: 1; animation: blink 1s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .hint { font-size: 11px; margin-top: 10px; opacity: 0.85; }
  .bottom-bar { margin-top: 18px; width: 100%; max-width: 340px; }
  .bottom-bar button {
    width: 100%; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-size: 15px;
  }
  #logoutBtn { background: #c0392b; color: #fff; }
  .loading { color: #555; font-size: 15px; }
</style>
</head>
<body>
  <div id="loading" class="loading">載入中...</div>
  <div id="cardWrap" style="display:none;">
    <div class="card" id="cardBox">
      <div class="icon" id="iconText">🙂</div>
      <div class="group" id="groupText">組別志工</div>
      <div class="name" id="nameText">姓名</div>
      <div class="period" id="periodText">
        <div class="until">有效期限至</div>
        <div class="until-date">--</div>
        <div class="since">(-- 起)</div>
      </div>
      <div class="status" id="statusText">狀態</div>
      <div class="clock" id="clockText">--:--:--<span class="blink">●</span></div>
      <div class="hint">此畫面時間為裝置即時時間,警衛可請志工當場核對秒數跳動</div>
    </div>
    <div class="bottom-bar">
      <button id="logoutBtn">登出</button>
    </div>
  </div>

  <script type="module">
    import { db, doc, getDoc } from "./firebase-config.js";

    const groupColors = {
      "行政": "#34495e",
      "課輔": "#2980b9",
      "導護": "#27ae60",
      "醫護": "#c0392b",
      "故事": "#8e44ad",
      "圖書": "#d35400",
    };
    const groupIcons = {
      "行政": "🗂️",
      "課輔": "📖",
      "導護": "🚦",
      "醫護": "🩺",
      "故事": "🦉",
      "圖書": "📚",
    };

    function formatROC(yyymm) {
      const s = String(yyymm);
      if (s.length < 5) return s;
      const year = s.slice(0, s.length - 2);
      const month = s.slice(-2);
      return `${year}年${month}月`;
    }

    function isWithinPeriod(validFrom, validTo) {
      const now = new Date();
      const rocYear = now.getFullYear() - 1911;
      const month = now.getMonth() + 1;
      const current = rocYear * 100 + month;
      return current >= Number(validFrom) && current <= Number(validTo);
    }

    const phone = sessionStorage.getItem("volunteerPhone");
    if (!phone) {
      window.location.href = "index.html";
    } else {
      loadCard(phone);
    }

    async function loadCard(phone) {
      try {
        const snap = await getDoc(doc(db, "volunteers", phone));
        if (!snap.exists()) {
          document.getElementById("loading").textContent = "查無志工資料,請洽行政室";
          return;
        }
        const data = snap.data();
        const valid = isWithinPeriod(data.validFrom, data.validTo) && data.status === "active";

        document.getElementById("nameText").textContent = data.name || "";
        document.getElementById("groupText").textContent = `${data.group || ""}志工`;
        document.getElementById("iconText").textContent = groupIcons[data.group] || "🙂";
        document.getElementById("periodText").innerHTML = `
          <div class="until">有效期限至</div>
          <div class="until-date">${formatROC(data.validTo)} 止</div>
          <div class="since">(${formatROC(data.validFrom)} 起)</div>
        `;
        document.getElementById("statusText").textContent = valid ? "✅ 可通行" : "⛔ 已失效/停權";

        const cardBox = document.getElementById("cardBox");
        cardBox.style.background = valid ? (groupColors[data.group] || "#34495e") : "#7f8c8d";
        if (!valid) cardBox.classList.add("expired");

        document.getElementById("loading").style.display = "none";
        document.getElementById("cardWrap").style.display = "block";

        setInterval(() => {
          const now = new Date();
          const t = now.toLocaleTimeString("zh-TW", { hour12: false });
          document.getElementById("clockText").innerHTML = `${t}<span class="blink">●</span>`;
        }, 1000);

        setTimeout(() => {
          sessionStorage.removeItem("volunteerPhone");
          window.location.href = "index.html";
        }, 30 * 60 * 1000);
      } catch (err) {
        console.error(err);
        document.getElementById("loading").textContent = "讀取失敗,請重新登入";
      }
    }

    document.getElementById("logoutBtn").addEventListener("click", () => {
      sessionStorage.removeItem("volunteerPhone");
      window.location.href = "index.html";
    });
  </script>
</body>
</html>
