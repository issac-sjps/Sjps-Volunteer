<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>志工識別證</title>
<style>
  body {
    font-family: "Microsoft JhengHei", sans-serif;
    background: #eef1f3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
  }
  .card {
    width: 320px;
    border-radius: 16px;
    padding: 24px;
    color: #fff;
    box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    text-align: center;
  }
  .card.expired { background: #7f8c8d !important; }
  .name { font-size: 26px; font-weight: bold; margin: 8px 0; }
  .group { font-size: 18px; margin-bottom: 12px; }
  .period { font-size: 15px; opacity: 0.9; margin-bottom: 16px; }
  .status {
    display: inline-block; padding: 4px 14px; border-radius: 20px;
    background: rgba(255,255,255,0.25); font-size: 14px; margin-bottom: 16px;
  }
  .clock {
    font-size: 22px; font-weight: bold; letter-spacing: 1px;
    background: rgba(0,0,0,0.15); border-radius: 8px; padding: 8px;
  }
  .clock .blink { opacity: 1; animation: blink 1s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .hint { font-size: 12px; margin-top: 10px; opacity: 0.85; }
  .bottom-bar {
    margin-top: 20px; display: flex; gap: 10px;
  }
  .bottom-bar button {
    padding: 8px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px;
  }
  #logoutBtn { background: #c0392b; color: #fff; }
  #printBtn { background: #2f6f4f; color: #fff; }
  .loading { color: #555; font-size: 15px; }
  #editBtn {
    position: fixed; top: 14px; right: 14px;
    padding: 6px 12px; font-size: 13px; border: none; border-radius: 6px;
    background: #34495e; color: #fff; cursor: pointer; opacity: 0.85;
  }
</style>
</head>
<body>
  <button id="editBtn" onclick="window.location.href='admin.html'">編輯</button>
  <div id="loading" class="loading">載入中...</div>
  <div id="cardWrap" style="display:none;">
    <div class="card" id="cardBox">
      <div class="group" id="groupText">組別</div>
      <div class="name" id="nameText">姓名</div>
      <div class="period" id="periodText">有效期間:11507-11509</div>
      <div class="status" id="statusText">狀態</div>
      <div class="clock" id="clockText">--:--:--<span class="blink">●</span></div>
      <div class="hint">此畫面時間為系統伺服器即時時間,警衛可請志工當場核對秒數跳動</div>
    </div>
    <div class="bottom-bar">
      <button id="printBtn">列印貼紙</button>
      <button id="logoutBtn">登出</button>
    </div>
  </div>

  <script type="module">
    import { auth, db, doc, getDoc, onAuthStateChanged, signOut } from "./firebase-config.js";

    const groupColors = {
      "行政": "#34495e",
      "課輔": "#2980b9",
      "導護": "#27ae60",
      "醫護": "#c0392b",
      "故事": "#8e44ad",
      "圖書": "#d35400",
    };

    // 判斷民國年月格式 (例如 11507) 是否落在有效區間內
    function isWithinPeriod(validFrom, validTo) {
      const now = new Date();
      const rocYear = now.getFullYear() - 1911;
      const month = now.getMonth() + 1;
      const current = rocYear * 100 + month; // 11507
      return current >= Number(validFrom) && current <= Number(validTo);
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "index.html";
        return;
      }
      try {
        const snap = await getDoc(doc(db, "volunteers", user.uid));
        if (!snap.exists()) {
          document.getElementById("loading").textContent = "查無志工資料,請洽行政室";
          return;
        }
        const data = snap.data();
        const valid = isWithinPeriod(data.validFrom, data.validTo) && data.status === "active";

        document.getElementById("nameText").textContent = data.name || "";
        document.getElementById("groupText").textContent = data.group || "";
        document.getElementById("periodText").textContent =
          `有效期間:${data.validFrom}-${data.validTo}`;
        document.getElementById("statusText").textContent = valid ? "✅ 可通行" : "⛔ 已失效/停權";

        const cardBox = document.getElementById("cardBox");
        cardBox.style.background = valid ? (groupColors[data.group] || "#34495e") : "#7f8c8d";
        if (!valid) cardBox.classList.add("expired");

        document.getElementById("loading").style.display = "none";
        document.getElementById("cardWrap").style.display = "block";

        // 即時時鐘,每秒更新,無法用截圖偽造
        setInterval(() => {
          const now = new Date();
          const t = now.toLocaleTimeString("zh-TW", { hour12: false });
          document.getElementById("clockText").innerHTML = `${t}<span class="blink">●</span>`;
        }, 1000);

        // 30 分鐘自動登出,避免長時間截圖共用
        setTimeout(() => signOut(auth), 30 * 60 * 1000);
      } catch (err) {
        console.error(err);
        document.getElementById("loading").textContent = "讀取失敗,請重新登入";
      }
    });

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "index.html";
    });

    document.getElementById("printBtn").addEventListener("click", () => {
      window.location.href = "print.html";
    });
  </script>
</body>
</html>
