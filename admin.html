<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>志工資料編輯</title>
<style>
  body { font-family: "Microsoft JhengHei", sans-serif; background: #f2f5f7; margin: 0; padding: 20px; }
  h1 { text-align: center; color: #234; font-size: 20px; }
  .toolbar { text-align: center; margin-bottom: 20px; }
  .toolbar button {
    padding: 8px 16px; font-size: 14px; border: none; border-radius: 6px;
    background: #2f6f4f; color: #fff; cursor: pointer; margin: 0 4px;
  }
  table { width: 100%; min-width: 760px; max-width: 1000px; margin: 0 auto; border-collapse: collapse; background: #fff; table-layout: fixed; }
  th, td { border: 1px solid #ddd; padding: 8px; font-size: 14px; text-align: center; vertical-align: middle; }
  th { background: #34495e; color: #fff; }
  input, select { width: 100%; padding: 6px 4px; font-size: 13px; box-sizing: border-box; }
  .save-btn, .del-btn, .print-btn { margin-top: 4px; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; color: #fff; }
  .save-btn { background: #2980b9; }
  .del-btn { background: #c0392b; }
  .print-btn { background: #8e44ad; }
  .table-wrap { overflow-x: auto; }
  .filter-bar { max-width: 1000px; margin: 0 auto 14px; text-align: center; }
  .filter-bar button {
    padding: 6px 14px; margin: 3px; border: 1px solid #ccc; border-radius: 20px;
    background: #fff; cursor: pointer; font-size: 13px; color: #333;
  }
  .filter-bar button.active { background: #2f6f4f; color: #fff; border-color: #2f6f4f; }
  th.sortable { cursor: pointer; user-select: none; }
  th.sortable:hover { background: #3d5a73; }
  th .arrow { font-size: 11px; margin-left: 3px; opacity: 0.8; }
  .new-tag { color: #2980b9; font-size: 12px; margin-top: 2px; }
  .lock-screen {
    position: fixed; inset: 0; background: #eef1f3;
    display: flex; align-items: center; justify-content: center;
  }
  .lock-box {
    background: #fff; padding: 32px; border-radius: 12px; width: 280px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1); text-align: center;
  }
  .lock-box input { width: 100%; padding: 10px; margin: 12px 0; box-sizing: border-box; font-size: 15px; }
  .lock-box button { width: 100%; padding: 10px; background: #2f6f4f; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
  .err { color: #c0392b; font-size: 13px; min-height: 18px; }
  .hint { max-width: 1000px; margin: 0 auto 16px; font-size: 13px; color: #666; text-align: center; }
</style>
</head>
<body>

  <div class="lock-screen" id="lockScreen">
    <div class="lock-box">
      <div>請輸入管理密碼</div>
      <input type="password" id="pwdInput" placeholder="密碼" />
      <button id="unlockBtn">確認</button>
      <div class="err" id="pwdErr"></div>
    </div>
  </div>

  <div id="mainContent" style="display:none;">
    <h1>志工資料編輯</h1>
    <div class="hint">新增志工:輸入姓名、手機號碼、民國生日、組別、有效期間後按「儲存」即可(手機號碼建立後不可修改,如果打錯要用「刪除」後重新新增)</div>
    <div class="toolbar">
      <button id="addBtn">新增志工</button>
      <label style="font-size:13px; color:#333;">每人張數:
        <input type="number" id="qtyInput" value="1" min="1" max="20" style="width:60px; display:inline-block;" />
      </label>
      <button id="printSelectedBtn">列印所選</button>
      <button id="printAllBtn">列印全部</button>
      <button onclick="window.location.href='card.html'">返回識別證</button>
    </div>
    <div class="filter-bar" id="filterBar"></div>
    <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:36px;"><input type="checkbox" id="checkAll" /></th>
          <th class="sortable" data-field="name">姓名<span class="arrow"></span></th>
          <th class="sortable" data-field="phone">手機號碼(帳號)<span class="arrow"></span></th>
          <th>民國生日(密碼)</th>
          <th class="sortable" data-field="group">組別<span class="arrow"></span></th>
          <th class="sortable" data-field="validFrom">起始 (民國年月)<span class="arrow"></span></th>
          <th class="sortable" data-field="validTo">結束 (民國年月)<span class="arrow"></span></th>
          <th class="sortable" data-field="status">狀態<span class="arrow"></span></th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    </div>
  </div>

  <script type="module">
    import { db, collection, getDocs, doc, setDoc, updateDoc, deleteDoc } from "./firebase-config.js";

    const ADMIN_PASSWORD = "073411373";
    const groups = ["行政", "課輔", "導護", "醫護", "故事", "圖書"];

    let allVolunteers = []; // { id, ...data }
    let currentFilter = "全部";
    let currentSort = { field: null, dir: 1 };

    document.getElementById("unlockBtn").addEventListener("click", () => {
      const input = document.getElementById("pwdInput").value;
      if (input === ADMIN_PASSWORD) {
        document.getElementById("lockScreen").style.display = "none";
        document.getElementById("mainContent").style.display = "block";
        buildFilterBar();
        loadVolunteers();
      } else {
        document.getElementById("pwdErr").textContent = "密碼錯誤";
      }
    });
    document.getElementById("pwdInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") document.getElementById("unlockBtn").click();
    });

    function groupOptions(selected) {
      return groups
        .map((g) => `<option value="${g}" ${g === selected ? "selected" : ""}>${g}</option>`)
        .join("");
    }

    function buildFilterBar() {
      const bar = document.getElementById("filterBar");
      const options = ["全部", ...groups];
      bar.innerHTML = options
        .map((g) => `<button class="filter-btn ${g === currentFilter ? "active" : ""}" data-group="${g}">${g}</button>`)
        .join("");
      bar.querySelectorAll(".filter-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          currentFilter = btn.dataset.group;
          bar.querySelectorAll(".filter-btn").forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          renderTable();
        });
      });
    }

    document.querySelectorAll("th.sortable").forEach((th) => {
      th.addEventListener("click", () => {
        const field = th.dataset.field;
        if (currentSort.field === field) {
          currentSort.dir *= -1;
        } else {
          currentSort = { field, dir: 1 };
        }
        document.querySelectorAll("th.sortable .arrow").forEach((a) => (a.textContent = ""));
        th.querySelector(".arrow").textContent = currentSort.dir === 1 ? "▲" : "▼";
        renderTable();
      });
    });

    async function loadVolunteers() {
      const tbody = document.getElementById("tableBody");
      tbody.innerHTML = "<tr><td colspan='9'>載入中...</td></tr>";
      const snap = await getDocs(collection(db, "volunteers"));
      allVolunteers = [];
      snap.forEach((docSnap) => {
        allVolunteers.push({ id: docSnap.id, ...docSnap.data() });
      });
      renderTable();
    }

    function renderTable() {
      const tbody = document.getElementById("tableBody");
      tbody.innerHTML = "";

      let list = allVolunteers.slice();
      if (currentFilter !== "全部") {
        list = list.filter((v) => v.group === currentFilter);
      }
      if (currentSort.field) {
        list.sort((a, b) => {
          const av = (a[currentSort.field] || "").toString();
          const bv = (b[currentSort.field] || "").toString();
          return av.localeCompare(bv, "zh-Hant") * currentSort.dir;
        });
      }
      if (!list.length) {
        tbody.innerHTML = "<tr><td colspan='9'>目前沒有符合的志工資料</td></tr>";
        return;
      }
      list.forEach((v) => addRow(v.id, v, false));
    }

    // isNew = true 代表尚未存進 Firestore 的新志工列,手機號碼欄位可編輯
    function addRow(phoneId, data = {}, isNew = true) {
      const tbody = document.getElementById("tableBody");
      const tr = document.createElement("tr");
      tr.dataset.phoneId = phoneId || "";

      tr.innerHTML = `
        <td>${!isNew ? `<input type="checkbox" class="rowCheck" />` : ""}</td>
        <td><input type="text" class="nameInput" value="${data.name || ""}" /></td>
        <td>
          <input type="text" class="phoneInput" value="${data.phone || phoneId || ""}" placeholder="0912345678" ${isNew ? "" : "readonly"} />
          ${isNew ? '<div class="new-tag">建立後不可修改</div>' : ""}
        </td>
        <td><input type="text" class="birthdayInput" value="${data.birthday || ""}" placeholder="791130" /></td>
        <td><select class="groupInput">${groupOptions(data.group)}</select></td>
        <td><input type="text" class="fromInput" value="${data.validFrom || ""}" placeholder="11507" /></td>
        <td><input type="text" class="toInput" value="${data.validTo || ""}" placeholder="11509" /></td>
        <td>
          <select class="statusInput">
            <option value="active" ${data.status === "active" ? "selected" : ""}>啟用</option>
            <option value="suspended" ${data.status === "suspended" ? "selected" : ""}>停權</option>
          </select>
        </td>
        <td>
          <button class="save-btn">儲存</button>
          ${!isNew ? `<button class="print-btn">列印</button><button class="del-btn">刪除</button>` : ""}
        </td>
      `;
      tbody.appendChild(tr);

      tr.querySelector(".save-btn").addEventListener("click", async () => {
        const phone = tr.querySelector(".phoneInput").value.trim();
        if (!phone) {
          alert("請輸入手機號碼");
          return;
        }
        const payload = {
          phone,
          name: tr.querySelector(".nameInput").value.trim(),
          birthday: tr.querySelector(".birthdayInput").value.trim(),
          group: tr.querySelector(".groupInput").value,
          validFrom: tr.querySelector(".fromInput").value.trim(),
          validTo: tr.querySelector(".toInput").value.trim(),
          status: tr.querySelector(".statusInput").value,
        };
        try {
          if (isNew) {
            await setDoc(doc(db, "volunteers", phone), payload);
          } else {
            await updateDoc(doc(db, "volunteers", tr.dataset.phoneId), payload);
          }
          alert("已儲存");
          loadVolunteers();
        } catch (err) {
          console.error(err);
          alert("儲存失敗:" + err.message);
        }
      });

      const delBtn = tr.querySelector(".del-btn");
      if (delBtn) {
        delBtn.addEventListener("click", async () => {
          if (!confirm(`確定要刪除「${data.name}」的資料嗎?`)) return;
          try {
            await deleteDoc(doc(db, "volunteers", phoneId));
            tr.remove();
          } catch (err) {
            console.error(err);
            alert("刪除失敗:" + err.message);
          }
        });
      }

      const printBtn = tr.querySelector(".print-btn");
      if (printBtn) {
        printBtn.addEventListener("click", () => {
          const qty = document.getElementById("qtyInput").value || 1;
          window.location.href = `print.html?phones=${encodeURIComponent(phoneId)}&qty=${qty}`;
        });
      }
    }

    document.getElementById("addBtn").addEventListener("click", () => {
      addRow(null, {}, true);
    });

    document.getElementById("checkAll").addEventListener("change", (e) => {
      document.querySelectorAll(".rowCheck").forEach((cb) => (cb.checked = e.target.checked));
    });

    document.getElementById("printSelectedBtn").addEventListener("click", () => {
      const phones = [];
      document.querySelectorAll("#tableBody tr").forEach((tr) => {
        const cb = tr.querySelector(".rowCheck");
        if (cb && cb.checked && tr.dataset.phoneId) phones.push(tr.dataset.phoneId);
      });
      if (!phones.length) {
        alert("請先勾選要列印的志工");
        return;
      }
      const qty = document.getElementById("qtyInput").value || 1;
      window.location.href = `print.html?phones=${encodeURIComponent(phones.join(","))}&qty=${qty}`;
    });

    document.getElementById("printAllBtn").addEventListener("click", () => {
      const phones = allVolunteers.map((v) => v.id);
      if (!phones.length) {
        alert("目前沒有志工資料");
        return;
      }
      const qty = document.getElementById("qtyInput").value || 1;
      window.location.href = `print.html?phones=${encodeURIComponent(phones.join(","))}&qty=${qty}`;
    });
  </script>
</body>
</html>
