<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>志工登入 - SJPS Volunteer</title>
<style>
  body {
    font-family: "Microsoft JhengHei", sans-serif;
    background: #f2f5f7;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
  }
  .box {
    background: #fff;
    padding: 32px;
    border-radius: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    width: 320px;
  }
  h1 { font-size: 20px; text-align: center; margin-bottom: 24px; color: #234; }
  label { display: block; font-size: 14px; margin-bottom: 4px; color: #555; }
  input {
    width: 100%; padding: 10px; margin-bottom: 16px;
    border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box;
    font-size: 15px;
  }
  button {
    width: 100%; padding: 10px; background: #2f6f4f; color: #fff;
    border: none; border-radius: 6px; font-size: 15px; cursor: pointer;
  }
  button:hover { background: #245a3e; }
  .msg { color: #c0392b; font-size: 13px; margin-top: 10px; text-align: center; min-height: 18px; }
  .note { font-size: 12px; color: #888; margin-top: 16px; text-align: center; }
</style>
</head>
<body>
  <div class="box">
    <h1>志工識別證系統登入</h1>
    <label for="phone">手機號碼</label>
    <input type="text" id="phone" placeholder="請輸入手機號碼" inputmode="numeric" autocomplete="off" />
    <label for="birthday">民國生日(例如 791130)</label>
    <input type="text" id="birthday" placeholder="請輸入民國生日 6 碼" inputmode="numeric" autocomplete="off" />
    <button id="loginBtn">登入</button>
    <div class="msg" id="msg"></div>
    <div class="note">手機號碼與生日皆對正確,才能查看識別證</div>
  </div>

  <script type="module">
    import { db, doc, getDoc } from "./firebase-config.js";

    const msg = document.getElementById("msg");
    const loginBtn = document.getElementById("loginBtn");

    loginBtn.addEventListener("click", async () => {
      const phone = document.getElementById("phone").value.trim();
      const birthday = document.getElementById("birthday").value.trim();
      if (!phone || !birthday) {
        msg.textContent = "請輸入手機號碼與生日";
        return;
      }
      msg.textContent = "查詢中...";
      try {
        const snap = await getDoc(doc(db, "volunteers", phone));
        if (!snap.exists()) {
          msg.textContent = "查無此手機號碼,請確認是否輸入正確";
          return;
        }
        const data = snap.data();
        if (String(data.birthday) !== birthday) {
          msg.textContent = "生日不正確";
          return;
        }
        // 驗證成功,把手機號碼存到瀏覽器的 sessionStorage(關閉分頁就會清除)
        sessionStorage.setItem("volunteerPhone", phone);
        window.location.href = "card.html";
      } catch (err) {
        console.error(err);
        msg.textContent = "查詢失敗,請稍後再試";
      }
    });

    // 按 Enter 也可以送出
    document.getElementById("birthday").addEventListener("keydown", (e) => {
      if (e.key === "Enter") loginBtn.click();
    });
  </script>
</body>
</html>
